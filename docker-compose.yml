services:
  temp-db:
    image: postgres:15
    container_name: temp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tempdb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - temp-data:/var/lib/postgresql/data
    networks:
      - temp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-tempdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  temp-backend:
    build:
      context: ./
      dockerfile: src/main/docker/Dockerfile.jvm

    env_file:
      - .env
    ports:
      - "${QUARKUS_HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      temp-db:
        condition: service_healthy
    networks:
      - temp-network

networks:
  temp-network:
    driver: bridge

volumes:
  temp-data:
  