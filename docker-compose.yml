services:
  temp-db:
    image: postgres:15
    container_name: temp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tempdb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - temp-data:/var/lib/postgresql/data
    networks:
      - temp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-tempdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  temp-backend:
    build:
      context: ./
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: temp-backend
    ports:
      - "${QUARKUS_HTTP_PORT:-8080}:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: ${QUARKUS_DATASOURCE_JDBC_URL}
      QUARKUS_DATASOURCE_USERNAME: ${QUARKUS_DATASOURCE_USERNAME}
      QUARKUS_DATASOURCE_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD}
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: ${QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION:-update}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      # Configuración HMAC para JWT
      SMALLRYE_JWT_SIGN_KEY: ${SMALLRYE_JWT_SIGN_KEY}
      SMALLRYE_JWT_SIGN_KEY_FORMAT: ${SMALLRYE_JWT_SIGN_KEY_FORMAT:-BASE64}
      SMALLRYE_JWT_NEW_TOKEN_SIGNATURE_ALGORITHM: ${SMALLRYE_JWT_NEW_TOKEN_SIGNATURE_ALGORITHM:-HS256}
    restart: unless-stopped
    networks:
      - temp-network
    depends_on:
      temp-db:
        condition: service_healthy

networks:
  temp-network:
    driver: bridge

volumes:
  temp-data:
  